[project]
name = "lacuna"
version = "0.0.1"
description = "Find the holes your code already drew."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Shawn Bays", email = "shawnbays2003@gmail.com" }]
# license = "..."   # Deferred — see DEFERRALS.md
keywords = ["code-quality", "static-analysis", "patterns", "tui"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    # Engine deps will be added as implementation progresses:
    # "tree-sitter >= 0.21",
    # "tree-sitter-python >= 0.21",
    # "textual >= 0.50",
]

[project.optional-dependencies]
dev = [
    "pytest >= 7.0",
    "pytest-cov >= 4.0",
    "ruff >= 0.1",
    "mypy >= 1.0",
]
docs = [
    "mkdocs-material >= 9.0",
    "mkdocstrings[python] >= 0.20",
]

[project.scripts]
lacuna = "lacuna.cli:main"

[project.urls]
# Homepage   = "https://lacuna.dev"      # Deferred — see DEFERRALS.md
# Repository = "https://github.com/..."  # Deferred — see DEFERRALS.md

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lacuna"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
