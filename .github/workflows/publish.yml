name: Publish to PyPI

# Ships wheels + sdist to PyPI when a GitHub release is published.
#
# Primary path (release: published):
#   1. Tag the release commit with v*.*.* — wheels.yml builds the
#      mypyc-compiled wheel matrix.
#   2. Attach wheels.yml's artifacts (and sdist) to the GitHub
#      release before publishing it. The release-checks + wheels
#      jobs gate the publish step by virtue of being upstream.
#   3. Publishing the release fires this workflow, which downloads
#      the release assets and pushes them to PyPI via the official
#      pypa/gh-action-pypi-publish action.
#
# TestPyPI rehearsal path (workflow_dispatch):
#   Builds a fresh sdist + pure-Python wheel and publishes to
#   test.pypi.org. Skips the mypyc matrix — that's for the real
#   release; the rehearsal is just to confirm the upload + install
#   loop. Choose target=testpypi (default) or target=pypi.
#
# Required secrets:
#   PYPI_API_TOKEN       — scoped to the absentia project on PyPI.
#   TEST_PYPI_API_TOKEN  — scoped to absentia on test.pypi.org.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  publish:
    name: ${{ github.event_name == 'release' && 'release → PyPI' || format('dispatch → {0}', inputs.target) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "*.whl" \
            --pattern "*.tar.gz"
          ls -la dist/

      - name: Build sdist + pure-Python wheel (dispatch path)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade build
          python -m build
          ls -la dist/

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
