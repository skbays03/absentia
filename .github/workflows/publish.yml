name: Publish to PyPI

# Ships wheels + sdist to PyPI when a GitHub release is published.
#
# Primary path (release: published):
#   1. Tag the release commit with v*.*.* — wheels.yml builds the
#      mypyc-compiled wheel matrix.
#   2. Attach wheels.yml's artifacts (and sdist) to the GitHub
#      release before publishing it. The release-checks + wheels
#      jobs gate the publish step by virtue of being upstream.
#   3. Publishing the release fires this workflow, which downloads
#      the release assets and pushes them to PyPI via the official
#      pypa/gh-action-pypi-publish action.
#
# TestPyPI rehearsal path (workflow_dispatch):
#   Builds an sdist only and publishes to test.pypi.org. The mypyc
#   matrix is wheels.yml's job — it produces manylinux/macOS/Windows
#   binary wheels that PyPI requires for compiled distributions.
#   The dispatch path can't replicate that (a Linux runner's
#   `python -m build` would emit a raw linux_x86_64-tagged wheel,
#   which PyPI rejects), so the rehearsal validates publish.yml +
#   auth + sdist round-trip only. `pip install absentia` from
#   TestPyPI on a user's machine falls back to building the sdist,
#   which re-runs mypyc locally — exercising that path on the
#   install side. Choose target=testpypi (default) or target=pypi.
#
# Auth: OIDC Trusted Publishing (no long-lived API tokens stored in
# repo secrets). Each registry must have a Trusted Publisher entry
# pointing at this workflow:
#
#   PyPI:     https://pypi.org/manage/project/absentia/settings/publishing/
#   TestPyPI: https://test.pypi.org/manage/project/absentia/settings/publishing/
#
# The publisher entry binds (repo owner, repo name, workflow filename,
# optional environment) to a project. The job below mints an OIDC ID
# token (via id-token: write), pypa/gh-action-pypi-publish exchanges
# it for a short-lived PyPI upload token. Compromised repo → no
# long-lived credential to leak.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read
  # OIDC id-token minting for PyPI Trusted Publishing. Job-level
  # would also work; workflow-level keeps the surface uniform across
  # every step in the publish job.
  id-token: write

jobs:
  publish:
    name: ${{ github.event_name == 'release' && 'release → PyPI' || format('dispatch → {0}', inputs.target) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "*.whl" \
            --pattern "*.tar.gz"
          ls -la dist/

      - name: Build sdist (dispatch path)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade build
          python -m build --sdist
          ls -la dist/

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # No password / token — the action auto-detects OIDC when
          # id-token write permission is granted and no credentials
          # are passed. PyPI verifies the GitHub-issued token against
          # the configured Trusted Publisher entry.
          skip-existing: true

      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # OIDC Trusted Publishing — see the publish-to-TestPyPI step
          # above for the auth model.
          skip-existing: true
