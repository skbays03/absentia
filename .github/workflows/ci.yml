name: CI

# Cheap, high-signal gates that fire on every push to main and every
# PR. Heavy verification (test matrix across Python versions, mypy,
# mkdocs --strict) lives in release-checks.yml and runs on tag push +
# manual dispatch — see scripts/release.sh for the dispatch entry point.
#
# Rationale: the local pre-push hook (scripts/local_ci.sh) already runs
# the full check set on the developer's machine before push, and the
# Mac → push → WSL pull cycle covers cross-platform verification at no
# cost. CI's remaining role here is the fingerprint-bump gate (which
# only earns its keep pre-merge) plus a free lint pass.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: pip install "ruff>=0.1"
      - name: Run ruff
        run: ruff check .

  fingerprint-bump:
    name: Fingerprint bump check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to diff against the base ref. fetch-depth=0
          # gets the full history; fetch-depth=2 would suffice for
          # push-on-main but PRs need the merge-base.
          fetch-depth: 0
      - name: Verify EXTRACTOR_FINGERPRINT bumped when extractors changed
        run: |
          # On PRs, diff against the PR base. On push-to-main, diff
          # against HEAD~1 (the immediately preceding commit).
          if [ -n "${{ github.base_ref }}" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=50 2>/dev/null || true
          else
            BASE="HEAD~1"
          fi
          bash scripts/check_fingerprint_bump.sh "$BASE"

  sdist-build:
    name: sdist builds clean
    runs-on: ubuntu-latest
    # Cheap (≤30 s) sanity check that pyproject + MANIFEST + the
    # build backend can produce an installable source distribution.
    # Catches breakage from missing files, wrong build-system
    # entries, or stale package-data globs *before* it surfaces at
    # release-cut time when wheels.yml builds an sdist for real.
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist
      - name: Inspect sdist contents
        run: |
          # Print the file list so a maintainer skimming a CI run
          # can spot accidentally-included or accidentally-omitted
          # files at a glance.
          tar -tzf dist/*.tar.gz | head -60
      - name: Install + import smoke check
        run: |
          # The sdist must be installable in a clean venv and the
          # package must import without compiled extensions
          # (mypyc-include is opt-in via wheel build; sdist is
          # pure-Python fallback).
          python -m venv /tmp/sdist-venv
          /tmp/sdist-venv/bin/pip install dist/*.tar.gz
          /tmp/sdist-venv/bin/python -c "import absentia; print('absentia', absentia.__version__)"
