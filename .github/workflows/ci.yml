name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lacuna with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage gate
        # Coverage config (branch=true, omit mypyc files, fail_under=73)
        # lives in pyproject.toml [tool.coverage.*]. The `--cov` flag
        # picks it up; the gate fires automatically.
        run: pytest --cov --cov-report=term -q

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: pip install "ruff>=0.1"
      - name: Run ruff
        run: ruff check .

  fingerprint-bump:
    name: Fingerprint bump check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to diff against the base ref. fetch-depth=0
          # gets the full history; fetch-depth=2 would suffice for
          # push-on-main but PRs need the merge-base.
          fetch-depth: 0
      - name: Verify EXTRACTOR_FINGERPRINT bumped when extractors changed
        run: |
          # On PRs, diff against the PR base. On push-to-main, diff
          # against HEAD~1 (the immediately preceding commit).
          if [ -n "${{ github.base_ref }}" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=50 2>/dev/null || true
          else
            BASE="HEAD~1"
          fi
          bash scripts/check_fingerprint_bump.sh "$BASE"

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lacuna with dev extras
        # mypy needs the dependencies importable to resolve types.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run mypy
        run: mypy src/lacuna

  docs-build:
    name: Docs build (mkdocs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build the docs site
        run: mkdocs build --strict
