name: Build wheels

# Build mypyc-compiled wheels for the platform × Python matrix.
# Triggered on version tags (v*.*.*) and manual dispatch. Wheels are
# uploaded as workflow artifacts; PyPI publish is a separate manual
# step (see .github/workflows/publish.yml when added).
#
# Without this workflow, `pip install lacuna` falls back to the sdist
# build, which works (pure-Python source is valid) but skips the
# mypyc speedup. Pre-built wheels deliver Row 2+3 perf to all users.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    # Lets a maintainer build wheels for testing without cutting a tag.

permissions:
  contents: read

jobs:
  build_wheels:
    name: ${{ matrix.os }} · ${{ matrix.archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: x86_64
          - os: ubuntu-24.04-arm
            archs: aarch64
          - os: macos-13          # x86_64 runner (Intel)
            archs: x86_64
          - os: macos-14          # arm64 runner (Apple Silicon)
            archs: arm64
          - os: windows-latest
            archs: AMD64
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Build for our supported Python floor and ceiling. Skip
          # PyPy and 32-bit; the mypyc wheels are CPython 3.13/3.14
          # only, matching pyproject's requires-python = ">=3.13".
          CIBW_BUILD: "cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* pp* *-win32 *-manylinux_i686"
          CIBW_ARCHS: ${{ matrix.archs }}
          # Quick smoke test post-build: import the compiled extension
          # and verify the basic mining flow works end-to-end.
          CIBW_TEST_REQUIRES: "pytest>=7.0 pytest-asyncio>=0.21"
          CIBW_TEST_COMMAND: >-
            python -c "import lacuna.mining, lacuna.symmetry; print('compiled:', lacuna.mining.__file__)" &&
            pytest {project}/tests/test_mining.py {project}/tests/test_symmetry.py -q

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
