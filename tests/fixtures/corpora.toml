# Corpus regression baselines.
#
# Each entry pins the gap + rule + entity counts that a `absentia check`
# is expected to produce against a known corpus. tests/test_corpus_regression.py
# loads this file, scans each corpus, and fails if any count drifts.
#
# Drift is a *signal*, not a bug — when you legitimately change rule-mining
# behavior, update the expected counts in the same commit. CI failure forces
# the question "did I mean to change this?"
#
# Corpora marked `optional = true` are skipped when their `path` doesn't
# exist (so CI on a fresh GitHub runner only checks absentia-self; power users
# / pre-merge runs locally include the rest).

[[corpus]]
name = "absentia-self"
path = "."           # always present (relative to repo root)
language = "python"
expected_gaps = 79        # 78 → 79; +1 from one of the three
                          # new series detectors firing on
                          # absentia's own source (probably the
                          # ordinal CRUD-style alphabet on a
                          # storage / repo class).
expected_rules = 42       # 41 → 42 alongside the new gap.
expected_entities = 1214  # 1187 → 1214; +27 from
                          # find_letter_series_gaps,
                          # _cluster_letters_by_proximity,
                          # find_version_directory_gaps,
                          # _first_entity_in_dir,
                          # find_ordinal_series_gaps,
                          # _candidate_prefixes,
                          # _ORDINAL_ALPHABETS table, plus the
                          # 14 new tests in test_series.py and
                          # the _class_with_methods helper.
optional = false

[[corpus]]
name = "redis"
path = "/tmp/redis"
language = "c"
expected_gaps = 241       # 242 → 241; the +1 ordinal hit cleared
                          # once Item G's name-hint gating landed.
expected_rules = 120      # 121 → 120 alongside.
expected_entities = 9240  # 9197 → 9240; +43 module entities from
                          # the Python files inside redis (build +
                          # test scripts).
optional = true

[[corpus]]
name = "nestjs"
path = "/tmp/nest"
language = "typescript"
expected_gaps = 129       # 121 → 129; +8 from Item G's ordinal
                          # CRUD detector finding real "Service /
                          # Controller class implements 3 of 4 CRUD
                          # ops; missing one" cases. Audited by hand
                          # 2026-05-09 — all 8 are genuine.
expected_rules = 101      # 93 → 101 alongside the new gaps.
expected_entities = 4066
optional = true

# Linux kernel intentionally omitted from the default registry: it's
# too slow for a regular regression check (~15-20 s per scan even
# warm). Add it back here when investigating mining-stage regressions
# specifically, with the rule count captured from a clean run.
