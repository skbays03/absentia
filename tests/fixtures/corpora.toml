# Corpus regression baselines.
#
# Each entry pins the gap + rule + entity counts that a `absentia check`
# is expected to produce against a known corpus. tests/test_corpus_regression.py
# loads this file, scans each corpus, and fails if any count drifts.
#
# Drift is a *signal*, not a bug — when you legitimately change rule-mining
# behavior, update the expected counts in the same commit. CI failure forces
# the question "did I mean to change this?"
#
# Corpora marked `optional = true` are skipped when their `path` doesn't
# exist (so CI on a fresh GitHub runner only checks absentia-self; power users
# / pre-merge runs locally include the rest).

[[corpus]]
name = "absentia-self"
path = "."           # always present (relative to repo root)
language = "python"
expected_gaps = 78        # 77 → 78; +1 from Item C's call_kwargs
                          # mining picking up a kwarg pattern in
                          # absentia's own source.
expected_rules = 41       # 40 → 41; +1 rule from call_kwargs.
expected_entities = 1181  # 1176 → 1181; +5 from _walk_call_kwargs
                          # + three new feature tests + one
                          # integration test.
optional = false

[[corpus]]
name = "redis"
path = "/tmp/redis"
language = "c"
expected_gaps = 241       # bumped from 240 alongside the
                          # EXTRACTOR_FINGERPRINT salt (cache was
                          # rebuilt; the new extract picked up one
                          # additional gap that pre-salt cached
                          # entries had silently shadowed)
expected_rules = 120
expected_entities = 9240  # 9197 → 9240; +43 module entities from
                          # the Python files inside redis (build +
                          # test scripts).
optional = true

[[corpus]]
name = "nestjs"
path = "/tmp/nest"
language = "typescript"
expected_gaps = 121
expected_rules = 93       # unique rules referenced by the gap list
expected_entities = 4066
optional = true

# Linux kernel intentionally omitted from the default registry: it's
# too slow for a regular regression check (~15-20 s per scan even
# warm). Add it back here when investigating mining-stage regressions
# specifically, with the rule count captured from a clean run.
